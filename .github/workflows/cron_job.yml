name: 15-Min Market Scanner

on:
  schedule:
    # Runs every 15 minutes (adjust cron as needed for IST market hours)
    - cron: '*/15 3-10 * * 1-5' 
  workflow_dispatch: # Allows manual run button in GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install -r requirements.txt
        
      - name: Run Scanner Script
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        # THIS LINE IS UPDATED TO MATCH YOUR NEW FILE NAME
        run: python ema_x_15mt_upstox_scanner.py
        
      - name: Commit Updated Ledger
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add master_ledger.csv
          git commit -m "Auto-update master ledger" || echo "No changes to commit"
          git push
